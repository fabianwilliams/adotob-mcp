name: Warm MCP storefront

# Pings the dynamic routes on mcp.adotob.com during likely viewing windows
# so Azure SWA's Consumption-tier managed functions stay warm and the first
# user request does not eat a cold-start 500. This is not a production
# uptime guarantee; it is a courtesy warmer for the licensing-motion demo.
#
# Cadence: every 30 minutes, 9am-6pm Eastern Time (13:00-22:00 UTC),
# Monday-Friday only. About 20 runs per weekday, 0 on weekends. Outside
# this window, the first hit may cold-start. That is acceptable for an
# OSS demo. Public repo means Actions minutes are free either way.
#
# GitHub may delay scheduled runs during peak load; the cron is a target,
# not a guarantee.

on:
  schedule:
    - cron: "*/30 13-22 * * 1-5"
  workflow_dispatch:

jobs:
  warm:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Hit critical URLs
        run: |
          for URL in \
            "https://mcp.adotob.com/" \
            "https://mcp.adotob.com/a2a/receipt/rcpt_2026-05-16_0a96ef3d" \
            "https://mcp.adotob.com/.well-known/agent.json"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 30 "$URL")
            echo "$URL -> $STATUS"
          done
